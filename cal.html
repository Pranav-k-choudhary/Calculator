<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .calculator{   /*background UI*/
            background-color: #3f3e3e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(255,255,0,0.3);
        }

        #display{    /*top display text box*/
            width: 300px;
            height: 50px;
            font-size: 24px;
            text-align: right;
            padding-right: 10px;
            margin-bottom: 10px;
            margin: 0 auto 10px auto;
            border-radius: 10px;
            border: none;
            color: rgb(246, 240, 240);
        }

        .buttons{
            justify-content: center;
            display: grid;   /*dividing in 4 grid*/
            grid-template-columns: repeat(4, 60px); /*4 column and each column has 60px wide [button]*/
            gap: 10px;  /*gap between all button*/
        }

        button{
            height: 50px;
            font-size: 20px;
            border-radius: 9px;
            border: none;
            cursor: pointer;
            background-color: #757272;
            color: white;
        }

        button:hover{
            background-color: #c1bbbb;
        }

        button:active{
            background-color: #999;
        }

        @media screen and (max-width: 768px) {
            .calculator {
                width: 90%;      /*full screen on mobile*/
                padding: 20px;
            }
            .buttons {
                grid-template-columns: repeat(4, 1fr);        /*buttons flexible width*/
                gap: 8px;
            }
            button {
                height: 40px;
                font-size: 18px;
            }
            #display {
                font-size: 20px;
                height: 40px;
                width: 85vw;
            }
        }

    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" placeholder="000" disabled>
        <div class="buttons">
            <button click="append('(')">(</button>
            <button click="append(')')">)</button>
            <button click="append('%')">%</button>
            <button click="clear('C')">C</button>
            
            <button click="append('7')">7</button>
            <button click="append('8')">8</button>
            <button click="append('9')">9</button>
            <button click="append('/')">/</button>

            <button click="append('4')">4</button>
            <button click="append('5')">5</button>
            <button click="append('6')">6</button>
            <button click="append('*')">*</button>

            <button click="append('1')">1</button>
            <button click="append('2')">2</button>
            <button click="append('3')">3</button>
            <button click="append('-')">-</button>

            <button click="append('0')">0</button>
            <button click="append('.')">.</button>
            <button click="append('=')">=</button>
            <button click="append('+')">+</button>
        </div>
    </div>
    <script>
        //This variable will store the current input as a string
        let string = "";
        //Select all element that have the class buttons
        let btn = document.querySelectorAll(".buttons");  //nodelist(20) [button, button, ........+ 18 times button]
        //Convert nodeList to Array and loop through each button
        Array.from(btn).forEach((buttons) => {
            //Add click event listener each button
            buttons.addEventListener('click', (e) => {
                //If the "=" button is clicked
                if(e.target.innerHTML == '='){
                    //Evaluate mathematical expression stored in string
                    string = eval(string);  //eval calculate value of string 7+8 = 15
                    //show the result in the input/display box
                    document.querySelector('input').value = string;
                }
                //If the "C" button is clicked --> clear
                else if(e.target.innerHTML == 'C'){
                    //string empty --> display becames empty
                    string = "";
                    //Clear the input box
                    document.querySelector('input').value = string;
                }
                //If any other button (numbers/operators) is clicked
                else{
                    //clicked button element we can see in the console and display
                    console.log(e.target);
                    //Append the clicked button's value to the string
                    string = string + e.target.innerHTML;
                    //Update the input field with the current string
                    document.querySelector('input').value = string;
                }
            })
        })
    </script>
</body>
</html>
